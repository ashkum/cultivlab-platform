name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: gitleaks — scan for secrets
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Fetch full git history so gitleaks can scan all commits,
          # not just the latest snapshot.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for org-level repos on the paid plan.
          # For private repos on free plan, this can be omitted.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # Belt-and-suspenders: also run the gitleaks binary directly so the
      # exit code is unambiguous in the job log.
      - name: Install gitleaks binary
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks

      - name: gitleaks detect (full history, verbose on failure)
        run: |
          gitleaks detect \
            --source . \
            --log-level warn \
            --exit-code 1 \
          || {
            echo ""
            echo "::error::gitleaks found secrets in the repository history."
            echo "Run 'gitleaks detect --source . --verbose' locally to see the findings."
            echo "Remove the secret, rotate it, and use git-filter-repo to scrub history."
            exit 1
          }
