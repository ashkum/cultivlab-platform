name: CI — Sprint 5.5 Founder Console

# Validates that the Founder Console Docker image builds cleanly and that
# the /health endpoint returns 200 without a live Postgres instance.
# /health is intentionally DB-free (lazy connection) so CI stays self-contained.
#
# Also smoke-tests /login (GET) to confirm the auth gate renders without error.

on:
  push:
    branches: [main]
    paths:
      - "services/founder-console/**"
      - "infra/docker-compose.yml"
      - ".github/workflows/ci-sprint55-founder-console.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/founder-console/**"
      - "infra/docker-compose.yml"
      - ".github/workflows/ci-sprint55-founder-console.yml"

jobs:
  founder-console:
    name: Build + health check
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    env:
      # Placeholder values — /health and /login (GET) don't touch auth or DB.
      # bcrypt format not validated at startup; lazy DB connection is never opened.
      FOUNDER_CONSOLE_PASSWORD_HASH: "ci-placeholder-not-a-real-bcrypt-hash"
      FOUNDER_CONSOLE_SECRET_KEY: "ci-test-secret-key-32-chars-xxxxxxxxxxx"
      COHORT_NAME: "ci-cohort"
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      DOMAIN: "ci.example.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build founder-console Docker image
        run: |
          docker build -t cultivlab-founder-console:ci services/founder-console/
          echo "✓ Docker build succeeded"

      # ── Run ───────────────────────────────────────────────────────────────
      - name: Start founder-console container
        run: |
          docker run -d \
            --name fc-ci \
            -p 8088:8080 \
            -e FOUNDER_CONSOLE_PASSWORD_HASH \
            -e FOUNDER_CONSOLE_SECRET_KEY \
            -e COHORT_NAME \
            -e DATABASE_URL \
            -e DOMAIN \
            cultivlab-founder-console:ci
          echo "✓ Container started"

      # ── Health ────────────────────────────────────────────────────────────
      - name: Wait for /health (up to 30 s)
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8088/health > /dev/null 2>&1; then
              echo "✓ /health responded on attempt $i"
              exit 0
            fi
            sleep 2
          done
          echo "✗ /health did not respond after 30 s"
          docker logs fc-ci
          exit 1

      - name: Verify /health body is {"status":"ok"}
        run: |
          BODY="$(curl -sf http://localhost:8088/health)"
          echo "Response: $BODY"
          echo "$BODY" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') == 'ok', f'unexpected body: {d}'
          print('✓ /health body verified')
          "

      # ── Auth gate smoke test ───────────────────────────────────────────────
      - name: /login (GET) returns 200
        run: |
          STATUS="$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8088/login)"
          [ "$STATUS" = "200" ] || {
            echo "✗ /login returned HTTP $STATUS (expected 200)"
            docker logs fc-ci
            exit 1
          }
          echo "✓ /login returned 200"

      - name: / (GET) redirects to /login without auth cookie
        run: |
          STATUS="$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8088/)"
          # FastAPI RedirectResponse returns 302 → Location: /login
          [ "$STATUS" = "302" ] || {
            echo "✗ / returned HTTP $STATUS (expected 302 redirect to /login)"
            docker logs fc-ci
            exit 1
          }
          echo "✓ / redirects to /login (auth gate working)"

      # ── Cleanup ───────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: docker stop fc-ci && docker rm fc-ci || true
