<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My CultivLab Site</title>
    <style>
        /* CHANGE COLORS HERE — try different ones! */
        body {
            background-color: #fff8e7;     /* page background */
            color: #2c2c2c;                /* main text color */
            font-family: Georgia, serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }

        h1 {
            color: #d97706;                /* heading color */
            border-bottom: 3px solid #d97706;
            padding-bottom: 10px;
        }

        .highlight {
            background-color: #fef3c7;     /* yellow highlight */
            padding: 2px 6px;
            border-radius: 4px;
        }

        button {
            background-color: #d97706;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #b45309;
        }

        footer {
            margin-top: 60px;
            text-align: center;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- ↓ CHANGE THE TITLE TO YOUR OWN ↓ -->
    <h1>Hi, I'm a CultivLab student!</h1>

    <!-- ↓ TELL US ABOUT YOURSELF ↓ -->
    <p>
        Welcome to <span class="highlight">my website</span>!
        I'm learning to build cool things with AI.
    </p>

    <p>
        This site is hosted on the internet — anyone in the world can see it.
        Try changing this paragraph to say something about yourself.
    </p>

    <!-- ↓ TRY CLICKING THIS BUTTON ↓ -->
    <button onclick="sayHi()">Click me!</button>
    <p id="message"></p>

    <script>
        // CHANGE THIS MESSAGE BELOW
        function sayHi() {
            document.getElementById("message").innerText =
                "🎉 You did it! You clicked your first button.";
        }
    </script>

    <footer>
        Made by me, powered by CultivLab 🌱
    </footer>

</body>
</html>
