repos:
  # ── Secret scanning ───────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)
        description: Detect hardcoded secrets before they reach git history

  # ── Shell scripts ─────────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: shellcheck (shell linting)
        types: [shell]
        args: [--severity=warning]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        name: shfmt (shell formatting)
        args: [-w, -i, '2', -ci]

  # ── Markdown ──────────────────────────────────────────────────────────────
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        name: prettier (markdown formatting)
        types: [markdown]
        args: ["--prose-wrap", "always", "--print-width", "100"]
